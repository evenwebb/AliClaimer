<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      width: 380px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
      color: #d3031c;
    }
    p {
      margin: 0 0 12px 0;
      color: #666;
      line-height: 1.4;
    }
    .step {
      background: #f8f8f8;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .step strong { color: #333; }
    button {
      width: 100%;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn-primary {
      background: #d3031c;
      color: white;
      margin-bottom: 8px;
    }
    .btn-primary:hover:not(:disabled) {
      background: #b00218;
    }
    .btn-secondary {
      background: #eee;
      color: #333;
    }
    .btn-secondary:hover:not(:disabled) {
      background: #ddd;
    }
    #status {
      margin-top: 12px;
      padding: 10px;
      background: #f0f8ff;
      border-radius: 6px;
      font-size: 13px;
      min-height: 40px;
      max-height: 100px;
      overflow-y: auto;
    }
    .error { color: #c00; }
    .success { color: #0a0; }
    .preview-toggle {
      display: block;
      margin-bottom: 12px;
      font-size: 13px;
      color: #666;
      cursor: pointer;
    }
    .preview-toggle input { margin-right: 6px; }
    .stats-box {
      margin-top: 12px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 6px;
      font-size: 13px;
    }
    .stats-box.empty { display: none; }
    .stats-row { margin: 4px 0; }

    /* Progress bar */
    .progress-container {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .progress-container progress {
      flex: 1;
      height: 8px;
      border-radius: 4px;
    }
    .progress-container progress::-webkit-progress-bar {
      background-color: #eee;
      border-radius: 4px;
    }
    .progress-container progress::-webkit-progress-value {
      background-color: #4CAF50;
      border-radius: 4px;
    }
    .progress-pct {
      font-size: 12px;
      color: #666;
      min-width: 36px;
      text-align: right;
    }

    /* Delay config */
    .delay-config {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #666;
    }
    .delay-config input[type="range"] {
      flex: 1;
      accent-color: #d3031c;
    }
    .delay-config .delay-value {
      min-width: 48px;
      text-align: right;
        font-weight: 600;
    }

    /* Order status list */
    .order-status-list {
      margin-top: 12px;
      max-height: 180px;
      overflow-y: auto;
      border: 1px solid #eee;
      border-radius: 6px;
    }
    .order-status-list.empty { display: none; }
    .order-status-item {
      display: flex;
      align-items: center;
      padding: 6px 10px;
      font-size: 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .order-status-item:last-child { border-bottom: none; }
    .order-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 8px;
      flex-shrink: 0;
    }
    .order-status-dot.claimed { background: #4CAF50; }
    .order-status-dot.found { background: #FF9800; }
    .order-status-dot.none { background: #ccc; }
    .order-status-dot.timeout { background: #f44336; }
    .order-status-dot.pending { background: #2196F3; }
    .order-status-id { flex: 1; font-family: monospace; }
    .order-status-label { color: #999; font-size: 11px; margin-left: 8px; }

    @media (prefers-color-scheme: dark) {
      body { background: #222; color: #ddd; }
      .step { background: #333; }
      .step strong { color: #eee; }
      .btn-secondary { background: #444; color: #ddd; }
      .btn-secondary:hover:not(:disabled) { background: #555; }
      #status { background: #2a2a3a; }
      .stats-box { background: #333; }
      .order-status-list { border-color: #444; }
      .order-status-item { border-bottom-color: #333; }
      .delay-config, .preview-toggle, p { color: #aaa; }
      h1 { color: #ff4444; }
    }
  </style>
</head>
<body>
  <h1>AliExpress Coupon Claimer</h1>
  <p>Claim £1 late delivery coupons from your orders. Go to your order list, then click Start.</p>

  <div class="step">
    <strong>Step 1:</strong> Open <a href="https://www.aliexpress.com/p/order/index.html" target="_blank">Your Orders</a>
  </div>
  <div class="step">
    <strong>Step 2:</strong> Scroll down to load more orders if needed
  </div>
  <div class="step">
    <strong>Step 3:</strong> Click Start to scan and claim
  </div>

  <label class="preview-toggle">
    <input type="checkbox" id="previewCheck">
    Preview mode (scan only, don't claim)
  </label>

  <div class="delay-config">
    <span>Delay:</span>
    <input type="range" id="delaySlider" min="0" max="5000" step="250" value="1500">
    <span class="delay-value" id="delayValue">1.5s</span>
  </div>

  <button id="startBtn" class="btn-primary">Start Claiming Coupons</button>
  <button id="stopBtn" class="btn-secondary" disabled>Stop</button>

  <div class="progress-container">
    <progress id="progressBar" value="0" max="100"></progress>
    <span class="progress-pct" id="progressPct">0%</span>
  </div>

  <div id="stats" class="stats-box"></div>
  <div id="orderStatusList" class="order-status-list empty"></div>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
